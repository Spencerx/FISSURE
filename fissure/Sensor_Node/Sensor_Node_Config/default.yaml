Sensor Node:
     autorun: false
     autorun_delay_seconds: 3
     autorun_interval_seconds: 3
     console_logging_level: 'INFO'     
     file_logging_level: 'DEBUG'
     gps:
          gps_autostart: true
          gps_tak_beacon: true            # Beacons to HIPRFISR, forwards to TAK
          gps_position:                    # Default starting position
               latitude: 40.7580   
               longitude: -73.9855
               altitude: 10.5
          gps_source: saved           # Options: gpsd, Meshtastic, saved, internet
          gps_update_interval_seconds: 20  # 300
          gpsd_serial_port: '/dev/ttyACM0'
     
     ############################################          
     hardware:
          defaults:
               sdr: 0
               wifi_adapter: 1
          sdrs:
               0:
                    radio_name: 'USRP B205mini'
                    type: 'USRP B20xmini'
                    serial: ''
                    daughterboard: ''
                    ip_address: ''
                    network_interface: ''
          wifi_adapters:
               0:
                    radio_name: 'Integrated Wi-Fi'
                    interface: 'wlan0'
                    notes: ''
               1:
                    radio_name: 'USB Wi-Fi Adapter'
                    interface: 'wlx00c0caafc930'
                    notes: ''

     #    sdrs:
     #         0:
     #              radio_name: 'USRP B205mini'       # Display name shown in Dashboard
     #              type: 'USRP B20xmini'             # Hardware type
     #              serial: '327A123'                 # Optional hardware serial number
     #              daughterboard: 'CBX-120'          # Optional daughterboard name
     #              ip_address: '192.168.10.2'        # Optional network SDR IP address
     #              network_interface: 'usb0'         # Optional network interface
     #              notes: 'Demo SDR'                 # Optional notes
     #
     #    wifi_adapters:
     #         1:
     #              radio_name: 'Alfa AWUS036ACH'     # Display name shown in Dashboard
     #              interface: 'wlx00c0caafc930'      # Linux network interface
     #              notes: 'Monitor mode capable'     # Optional notes
     ############################################

     heartbeat_interval: 5
     heartbeat_interval_connected: 60
     hb_port: "6100"
     hiprfisr_ip_address: '127.0.0.1'  # HIPRFISR IP address the node connects to, '127.0.0.1' for local
     local_remote: remote                   # Does not need to be set, updated during init, "remote" or "local"
     location_description: Location text
     msg_port: "6101"
     network_type: IP                      # "IP" or "Meshtastic"
     nickname: Remote1
     node_ip_address: "auto"  # Node IP shown in Dashboard; "auto" detects route IP
     notes: Notes text
     meshtastic_serial_port: '/dev/ttyACM1'  # Typically /dev/ttyACM0, /dev/tty/USB0 (make sure gpsd service does not grab port)
     meshtastic_serial_baud_rate: '115200'

